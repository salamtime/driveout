<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Opening WhatsApp…</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f8fafc;
        color: #0f172a;
      }
      .card {
        width: min(28rem, calc(100vw - 2rem));
        border: 1px solid #dbeafe;
        border-radius: 24px;
        background: #ffffff;
        box-shadow: 0 24px 60px rgba(15, 23, 42, 0.08);
        padding: 1.5rem;
      }
      h1 {
        margin: 0 0 0.75rem;
        font-size: 1.25rem;
      }
      p {
        margin: 0;
        line-height: 1.6;
        color: #475569;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Opening WhatsApp…</h1>
      <p>Please wait while we prepare your message.</p>
    </div>
    <script>
      (function () {
        const params = new URLSearchParams(window.location.search);
        const key = params.get("key");
        if (!key) {
          return;
        }

        const storageKey = "wa-launch:" + key;

        const navigateIfReady = () => {
          const nextUrl = window.localStorage.getItem(storageKey);
          if (!nextUrl) {
            return false;
          }
          window.localStorage.removeItem(storageKey);
          window.location.href = nextUrl;
          return true;
        };

        if (navigateIfReady()) {
          return;
        }

        window.addEventListener("storage", function (event) {
          if (event.key !== storageKey || !event.newValue) {
            return;
          }
          window.localStorage.removeItem(storageKey);
          window.location.href = event.newValue;
        });

        let attempts = 0;
        const poll = window.setInterval(function () {
          attempts += 1;
          if (navigateIfReady() || attempts > 600) {
            window.clearInterval(poll);
          }
        }, 250);
      })();
    </script>
  </body>
</html>
