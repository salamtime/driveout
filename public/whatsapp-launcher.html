<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Opening WhatsApp…</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f8fafc;
        color: #0f172a;
      }
      .card {
        width: min(28rem, calc(100vw - 2rem));
        border: 1px solid #dbeafe;
        border-radius: 24px;
        background: #ffffff;
        box-shadow: 0 24px 60px rgba(15, 23, 42, 0.08);
        padding: 1.5rem;
      }
      h1 {
        margin: 0 0 0.75rem;
        font-size: 1.25rem;
      }
      p {
        margin: 0;
        line-height: 1.6;
        color: #475569;
      }
      .actions {
        display: none;
        margin-top: 1rem;
      }
      .actions.ready {
        display: block;
      }
      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 3rem;
        padding: 0 1rem;
        border-radius: 999px;
        border: 1px solid #22c55e;
        background: #16a34a;
        color: #ffffff;
        font-weight: 700;
        text-decoration: none;
      }
      .helper {
        margin-top: 0.75rem;
        font-size: 0.95rem;
        color: #64748b;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Opening WhatsApp…</h1>
      <p id="status">Please wait while we prepare your message.</p>
      <div id="actions" class="actions">
        <a id="open-link" class="button" href="#">Open WhatsApp</a>
        <p class="helper">If WhatsApp did not open automatically, tap the button above.</p>
      </div>
    </div>
    <script>
      (function () {
        const params = new URLSearchParams(window.location.search);
        const key = params.get("key");
        if (!key) {
          return;
        }

        const storageKey = "wa-launch:" + key;
        const actions = document.getElementById("actions");
        const openLink = document.getElementById("open-link");
        const status = document.getElementById("status");
        let currentUrl = null;

        const revealFallback = (url) => {
          if (!url) {
            return;
          }
          currentUrl = url;
          openLink.href = url;
          actions.classList.add("ready");
          status.textContent = "WhatsApp is ready. If it didn't open automatically, tap below.";
        };

        const navigateIfReady = () => {
          const nextUrl = window.localStorage.getItem(storageKey);
          if (!nextUrl) {
            return false;
          }
          window.localStorage.removeItem(storageKey);
          revealFallback(nextUrl);
          window.location.href = nextUrl;
          return true;
        };

        if (navigateIfReady()) {
          return;
        }

        window.addEventListener("storage", function (event) {
          if (event.key !== storageKey || !event.newValue) {
            return;
          }
          window.localStorage.removeItem(storageKey);
          revealFallback(event.newValue);
          window.location.href = event.newValue;
        });

        let attempts = 0;
        const poll = window.setInterval(function () {
          attempts += 1;
          if (navigateIfReady() || attempts > 600) {
            window.clearInterval(poll);
          }
        }, 250);

        openLink.addEventListener("click", function () {
          if (currentUrl) {
            window.location.href = currentUrl;
          }
        });
      })();
    </script>
  </body>
</html>
