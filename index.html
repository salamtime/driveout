<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Manage rentals, fleet, customers, and operations on Driveout." />
  <meta name="keywords" content="rental management, fleet operations, customer management, driveout workspace" />
  
  <!-- Favicon -->
  <link rel="icon" type="image/png" href="/assets/logo.png" />
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Scheherazade+New:wght@400;700&display=swap" rel="stylesheet">
  
  <!-- Open Graph / Social Media Meta Tags -->
  <meta property="og:title" content="Driveout Workspace" />
  <meta property="og:description" content="Manage rentals, fleet, customers, and operations on Driveout." />
  <meta property="og:image" content="/assets/logo.png" />
  <meta property="og:url" content="https://driveout.io" />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Driveout Workspace" />
  <meta name="twitter:description" content="Manage rentals, fleet, customers, and operations on Driveout." />
  <meta name="twitter:image" content="/assets/logo.png" />
  
  <title>Driveout Workspace</title>
  
  <script src="/js/error-handler.js"></script>

  <!-- Prevent extension conflicts -->
  <script>
    (function() {
      'use strict';
      const originalDefineProperty = Object.defineProperty;
      Object.defineProperty = function(obj, prop, descriptor) {
        try {
          if (prop === 'ethereum' && obj === window) return obj;
          return originalDefineProperty.call(this, obj, prop, descriptor);
        } catch (error) {
          console.warn('Property definition intercepted to prevent extension conflict:', error.message);
          return obj;
        }
      };
      setTimeout(() => { Object.defineProperty = originalDefineProperty; }, 2000);
    })();
  </script>

  <script>
    (function() {
      'use strict';

      const hostname = String(window.location.hostname || '').toLowerCase();
      const isDriveoutTenantHost =
        hostname.endsWith('.driveout.io') &&
        !hostname.startsWith('www.') &&
        !hostname.startsWith('admin.') &&
        !hostname.startsWith('app.') &&
        !hostname.startsWith('driveout.');

      if (!isDriveoutTenantHost) return;

      const tenantSlug = hostname.split('.')[0] || '';
      if (!tenantSlug || tenantSlug === 'saharax') return;

      const workspaceLabel = tenantSlug
        .split(/[\s-_]+/)
        .filter(Boolean)
        .map((segment) => segment.charAt(0).toUpperCase() + segment.slice(1).toLowerCase())
        .join(' ') || 'Driveout';
      const isAdminPath = String(window.location.pathname || '').startsWith('/admin');
      const title = isAdminPath ? `${workspaceLabel} Admin` : `${workspaceLabel} Workspace`;
      const description = isAdminPath
        ? `Manage rentals, fleet, customers, and operations for ${workspaceLabel}.`
        : `Open the ${workspaceLabel} workspace on Driveout.`;
      const initials = workspaceLabel
        .split(/\s+/)
        .filter(Boolean)
        .slice(0, 2)
        .map((part) => part.charAt(0).toUpperCase())
        .join('') || 'DW';
      const svg = [
        '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">',
        '<defs><linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#0f172a" /><stop offset="100%" stop-color="#334155" /></linearGradient></defs>',
        '<rect width="64" height="64" rx="18" fill="url(#g)" />',
        `<text x="32" y="38" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700" fill="#ffffff">${initials}</text>`,
        '</svg>',
      ].join('');
      const iconHref = `data:image/svg+xml;charset=UTF-8,${encodeURIComponent(svg)}`;

      document.title = title;

      const setMeta = (selector, content) => {
        const element = document.head.querySelector(selector);
        if (element) element.setAttribute('content', content);
      };

      setMeta('meta[name="description"]', description);
      setMeta('meta[property="og:title"]', title);
      setMeta('meta[property="og:description"]', description);
      setMeta('meta[property="og:url"]', window.location.origin);
      setMeta('meta[property="og:image"]', iconHref);
      setMeta('meta[name="twitter:title"]', title);
      setMeta('meta[name="twitter:description"]', description);
      setMeta('meta[name="twitter:image"]', iconHref);

      const favicon = document.head.querySelector('link[rel="icon"]');
      if (favicon) {
        favicon.setAttribute('href', iconHref);
      }
    })();
  </script>
</head>

<body>
  <div id="root"></div>
  
  <script>
    window.vehicleStore = {
      data: {},
      init: function() {
        try { const stored = localStorage.getItem('vehicleDataCache'); if (stored) this.data = JSON.parse(stored); } catch (e) { this.data = {}; }
      },
      save: function() { try { localStorage.setItem('vehicleDataCache', JSON.stringify(this.data)); } catch (e) { console.error('Error saving vehicle cache', e); } },
      getVehicle: function(id) { return this.data[id] || null; },
      updateVehicle: function(id, data) { this.data[id] = {...(this.data[id] || {}), ...data, updated_at: new Date().toISOString()}; this.save(); return this.data[id]; },
      listVehicles: function() { return Object.values(this.data); }
    };
    window.vehicleStore.init();
  </script>
  
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
